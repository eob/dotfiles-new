# eob-dev remote/devbox tmux config
# This is the INNER tmux config — runs on the remote devbox (eob-dev).
# Uses C-b (default prefix) so it doesn't clash with a local outer C-a tmux.
# C-h/j/k/l vim-style pane navigation (vim-tmux-navigator).
# Blue-tinted status bar to visually distinguish from outer tmux and from akern devbox.
#
# Reload: tmux source ~/.tmux.conf

# --- Prefix (keep default C-b) ---
set -g prefix C-b
bind C-b send-prefix

# --- True color & terminal ---
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc,ghostty:Tc,alacritty:Tc,tmux-256color:Tc"

# --- General ---
set-option -g status-position top
set -g renumber-windows on
set -g base-index 1
set -gw pane-base-index 1
set -sg escape-time 0
set -g mouse on
set -g focus-events on
set -g history-limit 50000

# Kill without confirmation.
bind & kill-window
bind x kill-pane

# Open new windows/panes in cwd.
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Mouse wheel scrollback.
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# --- vim-tmux-navigator: C-h/j/k/l pane switching ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l

# --- Status bar (blue tint to distinguish from outer local tmux and akern devbox) ---
set -g status-interval 60
set -g status-left "🛰  #[fg=colour24][#[fg=colour39]#S#[fg=colour24]]#[default] "
set -g status-right " #[fg=colour39]eob-dev #[fg=colour24]| #[fg=colour39]%b %e, %I:%M %p "
set -g status-style fg=white,bg=colour17

# Window list.
set -gw window-status-style fg=brightwhite
set -gw window-status-current-style fg=black,bg=colour39
set -g window-status-format '  #I #W #F  '
set -g window-status-current-format '  #I #W #F  '

# Message & mode styling.
set -g message-style fg=black,bg=colour39
set -g mode-style fg=black,bg=colour39

# Pane borders.
set -g pane-border-style fg=colour24
set -g pane-active-border-style fg=colour39
set -g pane-border-status top
set -g pane-border-format ''
set -g pane-border-lines heavy
